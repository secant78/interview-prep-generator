name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_revision:
        description: "ECS task definition revision to roll back to (e.g. 12)"
        required: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: interview-prep-generator
  ECS_CLUSTER: interview-prep
  ECS_SERVICE: interview-prep-generator
  CONTAINER_NAME: app

permissions:
  id-token: write  # OIDC auth to AWS
  contents: read

jobs:
  # ── Manual rollback (workflow_dispatch with rollback_revision set) ──────────
  rollback:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_revision != ''
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Roll back ECS service to revision ${{ github.event.inputs.rollback_revision }}
        run: |
          TASK_DEF="${{ env.ECR_REPOSITORY }}:${{ github.event.inputs.rollback_revision }}"
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "$TASK_DEF"
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}"
          echo "Rolled back to task definition revision ${{ github.event.inputs.rollback_revision }}"

  # ── Normal CI/CD (push to main or PR) ──────────────────────────────────────
  build-and-push:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_revision == ''
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$TAG"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only deploy on pushes to main, not PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          # Circuit breaker: ECS will auto-roll back if the new task fails
          # health checks within the deployment window.
