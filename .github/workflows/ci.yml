name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: "ECR image tag (git SHA) to roll back to"
        required: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: interview-prep-generator

permissions:
  contents: read

jobs:
  # ── Manual rollback ───────────────────────────────────────────────────────
  rollback:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Ansible
        run: |
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

      - name: Write inventory
        run: |
          echo "[app]" > ansible/inventory.ini
          echo "${{ secrets.EC2_HOST }} ansible_user=ec2-user ansible_ssh_private_key_file=/tmp/deploy_key.pem" >> ansible/inventory.ini

      - name: Roll back to ${{ github.event.inputs.rollback_tag }}
        run: |
          ansible-playbook ansible/playbooks/deploy.yml \
            -i ansible/inventory.ini \
            -e "image_tag=${{ github.event.inputs.rollback_tag }}"

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_tag == ''
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

  # ── Deploy (main branch only) ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Ansible
        run: |
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

      - name: Write inventory
        run: |
          echo "[app]" > ansible/inventory.ini
          echo "${{ secrets.EC2_HOST }} ansible_user=ec2-user ansible_ssh_private_key_file=/tmp/deploy_key.pem" >> ansible/inventory.ini

      - name: Deploy
        run: |
          ansible-playbook ansible/playbooks/deploy.yml \
            -i ansible/inventory.ini \
            -e "image_tag=${{ github.sha }}"
